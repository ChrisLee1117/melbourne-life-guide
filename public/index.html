<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>墨爾本生活助手</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Melbourne"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>

  <!-- SEO -->
  <meta name="description" content="墨爾本活動搜尋、超市特價、按距離排序"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;min-height:100dvh;background:linear-gradient(135deg,#0a0a1a 0%,#0d1b3e 50%,#0a0a1a 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#e2e8f0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    .header{background:linear-gradient(180deg,rgba(124,58,237,0.3) 0%,transparent 100%);padding:28px 20px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
    .header h1{font-size:clamp(20px,5vw,34px);font-weight:900;background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
    .header p{color:#94a3b8;margin-top:6px;font-size:12px}
    .live-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:20px;padding:3px 10px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite}
    .live-text{font-size:10px;color:#fca5a5;font-weight:600}

    /* Install banner */
    #installBanner{display:none;background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(79,70,229,0.25));border-bottom:1px solid rgba(124,58,237,0.3);padding:12px 16px;align-items:center;gap:12px}
    #installBanner .install-icon{font-size:28px;flex-shrink:0}
    #installBanner .install-text{flex:1}
    #installBanner .install-title{font-size:13px;font-weight:700;color:#c4b5fd}
    #installBanner .install-sub{font-size:11px;color:#64748b;margin-top:2px}
    #installBanner .install-btn{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    #installBanner .close-btn{background:none;border:none;color:#475569;font-size:18px;cursor:pointer;padding:4px}

    .tabs{display:flex;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:10}
    .tab{flex:1;padding:12px 8px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s}
    .tab.active{background:rgba(124,58,237,0.2);border-bottom-color:#7c3aed}
    .tab .label{font-size:14px;font-weight:700;color:#64748b}
    .tab.active .label{color:#c4b5fd}
    .tab .sub{font-size:10px;color:#475569}
    .tab.active .sub{color:#7c3aed}
    .content{max-width:560px;margin:0 auto;padding:16px 14px 80px}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:16px;margin-bottom:12px}
    label{font-size:10px;font-weight:700;letter-spacing:2px;color:#7c3aed;text-transform:uppercase;display:block;margin-bottom:7px}
    input[type=text],input[type=date]{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:11px;padding:11px 14px;color:#fff;font-size:15px;outline:none;margin-bottom:11px;-webkit-appearance:none}
    input::placeholder{color:#4a5568}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer}
    .btn-primary{width:100%;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:11px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(124,58,237,0.4);-webkit-tap-highlight-color:transparent}
    .btn-today{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:10px;padding:10px 11px;color:#c4b5fd;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
    .summary{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);border-radius:13px;padding:12px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
    .day-btn{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.2s;margin-bottom:7px;-webkit-tap-highlight-color:transparent}
    .day-btn.open{background:rgba(124,58,237,0.18);border-color:rgba(124,58,237,0.4)}
    .day-label{font-size:15px;font-weight:800;color:#e2e8f0}
    .day-label.today{color:#f59e0b}
    .day-label.tomorrow{color:#c4b5fd}
    .day-date{font-size:11px;color:#64748b}
    .day-count{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;color:#475569}
    .day-count.has-events{background:rgba(124,58,237,0.3);border-color:rgba(124,58,237,0.5);color:#c4b5fd}
    .chevron{color:#475569;font-size:13px;transition:transform 0.2s;display:inline-block}
    .chevron.open{transform:rotate(180deg)}
    .event-card{background:rgba(255,255,255,0.04);border-radius:13px;padding:14px;margin-bottom:7px;animation:fadeUp 0.3s ease both}
    .event-header{display:flex;justify-content:space-between;align-items:flex-start;gap:9px}
    .event-badges{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
    .cat-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
    .live-event-badge{font-size:9px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);padding:2px 6px;border-radius:20px}
    .event-name{margin:0 0 4px;font-size:14px;font-weight:800;color:#f1f5f9;line-height:1.2}
    .event-desc{margin:0 0 6px;font-size:11px;color:#94a3b8;line-height:1.6}
    .date-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;padding:3px 9px;margin-bottom:6px}
    .event-meta{display:flex;flex-direction:column;gap:2px}
    .event-meta span{font-size:11px;color:#cbd5e1}
    .dist-badge{text-align:center;border-radius:9px;padding:7px 9px;flex-shrink:0;min-width:48px}
    .dist-num{font-size:15px;font-weight:900}
    .dist-unit{font-size:8px;color:#94a3b8;font-weight:600}
    .directions-btn{display:block;margin-top:9px;border-radius:7px;padding:8px;text-decoration:none;font-size:11px;font-weight:700;text-align:center}
    .empty-day{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:11px;padding:18px;text-align:center;color:#475569;font-size:13px}
    .supermarket-card{border-radius:16px;padding:16px;margin-bottom:14px}
    .super-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .super-name{font-size:18px;font-weight:900;color:#f1f5f9}
    .super-tag{font-size:11px;color:#64748b}
    .super-link{display:flex;align-items:center;gap:10px;border-radius:10px;padding:11px 14px;text-decoration:none;transition:all 0.2s;margin-bottom:8px}
    .super-link span.icon{font-size:18px}
    .super-link span.text{font-size:14px;font-weight:600;color:#e2e8f0;flex:1}
    .super-link span.arrow{font-size:12px}
    .info-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;text-align:center;margin-top:6px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>
<body>

<!-- PWA Install Banner -->
<div id="installBanner">
  <div class="install-icon">📱</div>
  <div class="install-text">
    <div class="install-title">加入主畫面，隨時使用</div>
    <div class="install-sub">安裝後可離線瀏覽，像原生 App 一樣</div>
  </div>
  <button class="install-btn" id="installBtn">安裝</button>
  <button class="close-btn" onclick="dismissInstall()">✕</button>
</div>

<div class="header">
  <div style="font-size:11px;letter-spacing:4px;color:#7c3aed;font-weight:700;margin-bottom:5px;text-transform:uppercase">🇦🇺 墨爾本生活助手</div>
  <h1>Melbourne Life Guide</h1>
  <p>自動更新活動 · 超市特價 · 按距離排序</p>
  <div class="live-badge">
    <span class="live-dot"></span>
    <span class="live-text" id="lastUpdatedBadge">載入中...</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('events',this)">
    <div class="label">🗓️ 活動</div>
    <div class="sub">7天行程</div>
  </button>
  <button class="tab" onclick="switchTab('supermarket',this)">
    <div class="label">🛒 超市特價</div>
    <div class="sub">Woolies · Coles</div>
  </button>
</div>

<div id="tab-events" class="content">
  <div class="card">
    <label>📍 你的地區</label>
    <input type="text" id="suburb" placeholder="例如：Clayton、Box Hill、Fitzroy..." onkeydown="if(event.key==='Enter')search()"/>
    <label>📅 開始日期</label>
    <div style="display:flex;gap:8px;margin-bottom:11px">
      <input type="date" id="startDate" style="margin-bottom:0;flex:1"/>
      <button class="btn-today" id="todayBtn" onclick="goToday()">今天</button>
    </div>
    <div id="searchError" style="color:#fca5a5;font-size:12px;margin-bottom:9px;display:none"></div>
    <button class="btn-primary" onclick="search()">🔍 搜尋活動</button>
  </div>
  <div id="results"></div>
</div>

<div id="tab-supermarket" class="content" style="display:none">
  <div class="card" style="text-align:center">
    <div style="font-size:13px;color:#94a3b8;line-height:1.6">📅 特價每週三更新，點擊直接跳去官網查看最新優惠</div>
  </div>
  <div id="supermarkets"></div>
  <div class="info-box">
    <div style="font-size:12px;color:#475569;line-height:1.7">
      💡 想搜尋本週特價詳情？<br/>
      <span style="color:#7c3aed">傳一句「搜尋今週Woolworths特價」畀Claude</span>
    </div>
  </div>
</div>

<script>
const SUBURB_COORDS={"clayton":{lat:-37.9169,lng:145.1225},"cbd":{lat:-37.8136,lng:144.9631},"city":{lat:-37.8136,lng:144.9631},"fitzroy":{lat:-37.7994,lng:144.9786},"richmond":{lat:-37.8239,lng:144.9975},"st kilda":{lat:-37.8672,lng:144.9780},"south yarra":{lat:-37.8395,lng:144.9921},"brunswick":{lat:-37.7693,lng:144.9617},"collingwood":{lat:-37.8039,lng:144.9841},"northcote":{lat:-37.7726,lng:144.9997},"footscray":{lat:-37.8008,lng:144.8994},"williamstown":{lat:-37.8615,lng:144.8991},"dandenong":{lat:-37.9879,lng:145.2150},"frankston":{lat:-38.1440,lng:145.1239},"box hill":{lat:-37.8193,lng:145.1239},"glen waverley":{lat:-37.8785,lng:145.1633},"oakleigh":{lat:-37.8985,lng:145.0942},"keysborough":{lat:-37.9908,lng:145.1792},"noble park":{lat:-37.9679,lng:145.1772},"springvale":{lat:-37.9479,lng:145.1517},"essendon":{lat:-37.7495,lng:144.9213},"hawthorn":{lat:-37.8228,lng:145.0326},"camberwell":{lat:-37.8373,lng:145.0590},"malvern":{lat:-37.8635,lng:145.0287},"carlton":{lat:-37.7988,lng:144.9660},"parkville":{lat:-37.7882,lng:144.9534},"coburg":{lat:-37.7437,lng:144.9659},"spotswood":{lat:-37.8328,lng:144.8889}};
const SUPERMARKETS=[{name:"Woolworths",emoji:"🟢",color:"#16a34a",tagline:"每週三更新特價",links:[{label:"本週半價特惠",url:"https://www.woolworths.com.au/shop/browse/specials/half-price",icon:"🏷️"},{label:"全部特價商品",url:"https://www.woolworths.com.au/shop/browse/specials",icon:"📋"}]},{name:"Coles",emoji:"🔴",color:"#dc2626",tagline:"每週三更新特價",links:[{label:"本週半價特惠",url:"https://www.coles.com.au/half-price-specials",icon:"🏷️"},{label:"全部特價商品",url:"https://www.coles.com.au/on-special",icon:"📋"}]},{name:"ALDI",emoji:"🔵",color:"#0ea5e9",tagline:"每週三、六推出特賣",links:[{label:"本週 Special Buys",url:"https://www.aldi.com.au/en/special-buys/this-weeks-specials/",icon:"🏷️"},{label:"下週預告",url:"https://www.aldi.com.au/en/special-buys/next-weeks-specials/",icon:"📋"}]},{name:"Chemist Warehouse",emoji:"💊",color:"#f97316",tagline:"藥妝保健最平",links:[{label:"本週半價特惠",url:"https://www.chemistwarehouse.com.au/catalogue",icon:"🏷️"},{label:"全部特價商品",url:"https://www.chemistwarehouse.com.au/sale",icon:"📋"}]}];

let allEvents=[], lastUpdated=null, expandedDay=0, currentWeek=[];

// Init
const today=new Date();
document.getElementById("startDate").value=today.toISOString().slice(0,10);
document.getElementById("startDate").addEventListener("change",()=>{if(document.getElementById("suburb").value.trim()&&currentWeek.length)renderWeek();updateTodayBtn();});
updateTodayBtn();
loadEvents();
renderSupermarkets();

// PWA Install
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault(); deferredPrompt=e;
  if(!localStorage.getItem("installDismissed")) document.getElementById("installBanner").style.display="flex";
});
document.getElementById("installBtn").addEventListener("click",async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById("installBanner").style.display="none";
});
function dismissInstall(){
  document.getElementById("installBanner").style.display="none";
  localStorage.setItem("installDismissed","1");
}

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").then(()=>console.log("SW registered")).catch(console.error);
}

async function loadEvents(){
  try{
    const res=await fetch("/api/events");
    const data=await res.json();
    if(data.events&&data.events.length>0){
      allEvents=data.events; lastUpdated=data.lastUpdated;
      document.getElementById("lastUpdatedBadge").textContent=`自動更新：${lastUpdated||"最新"}`;
    } else {
      document.getElementById("lastUpdatedBadge").textContent="尚未更新，請執行 /api/update";
    }
  } catch(e){
    document.getElementById("lastUpdatedBadge").textContent="離線模式";
  }
}

function getCoords(input){
  const key=input.toLowerCase().trim();
  if(SUBURB_COORDS[key]) return SUBURB_COORDS[key];
  for(const [k,v] of Object.entries(SUBURB_COORDS)) if(k.includes(key)||key.includes(k)) return v;
  return {lat:-37.8136,lng:144.9631};
}
function getDist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}
function isEventOn(ev,date){
  const dow=date.getDay();
  if(!ev.daysOfWeek||!ev.daysOfWeek.includes(dow)) return false;
  const d=new Date(date); d.setHours(0,0,0,0);
  const s=new Date(ev.fixedStart+"T00:00:00"); s.setHours(0,0,0,0);
  const e=new Date(ev.fixedEnd+"T00:00:00"); e.setHours(0,0,0,0);
  return d>=s&&d<=e;
}
function getDayLabel(date,i){if(i===0)return"今天";if(i===1)return"明天";return date.toLocaleDateString("zh-TW",{weekday:"long"});}
function updateTodayBtn(){const v=document.getElementById("startDate").value;document.getElementById("todayBtn").style.display=v===new Date().toISOString().slice(0,10)?"none":"block";}
function goToday(){document.getElementById("startDate").value=new Date().toISOString().slice(0,10);updateTodayBtn();if(document.getElementById("suburb").value.trim())renderWeek();}

function search(){
  const suburb=document.getElementById("suburb").value.trim();
  const errEl=document.getElementById("searchError");
  if(!suburb){errEl.style.display="block";errEl.textContent="⚠️ 請輸入你的地區。";return;}
  errEl.style.display="none"; renderWeek();
}

function renderWeek(){
  const suburb=document.getElementById("suburb").value.trim();
  const startDate=document.getElementById("startDate").value;
  const coords=getCoords(suburb);
  const base=new Date(startDate+"T00:00:00"); base.setHours(0,0,0,0);
  currentWeek=Array.from({length:7},(_,i)=>{
    const d=new Date(base); d.setDate(base.getDate()+i);
    const events=allEvents.filter(ev=>isEventOn(ev,d)).map(ev=>({...ev,distance:getDist(coords.lat,coords.lng,ev.venueLat||-37.8136,ev.venueLng||144.9631)})).sort((a,b)=>parseFloat(a.distance)-parseFloat(b.distance));
    return{date:d,label:getDayLabel(d,i),dateStr:d.toLocaleDateString("zh-TW",{month:"long",day:"numeric"}),events};
  });
  const total=currentWeek.reduce((s,d)=>s+d.events.length,0);
  let html=`<div class="summary"><div><div style="font-size:11px;color:#94a3b8"><strong style="color:#e2e8f0">${suburb}</strong> 附近7天</div><div style="font-size:19px;font-weight:800;color:#c4b5fd">共 ${total} 個活動</div></div><div style="font-size:28px">🗓️</div></div>`;
  currentWeek.forEach((day,di)=>{
    const isOpen=expandedDay===di;
    html+=`<div><button class="day-btn ${isOpen?"open":""}" onclick="toggleDay(${di})"><div><div class="day-label ${di===0?"today":di===1?"tomorrow":""}">${day.label}</div><div class="day-date">${day.dateStr}</div></div><div style="display:flex;align-items:center;gap:7px"><span class="day-count ${day.events.length>0?"has-events":""}">${day.events.length} 個</span><span class="chevron ${isOpen?"open":""}">▼</span></div></button><div style="display:${isOpen?"block":"none"};margin-top:5px">`;
    if(day.events.length===0){html+=`<div class="empty-day">😴 今天沒有活動</div>`;}
    else day.events.forEach((ev,ei)=>{
      const c=ev.color||"#7c3aed";
      html+=`<div class="event-card" style="border:1px solid ${c}33;border-left:4px solid ${c};animation-delay:${ei*0.04}s"><div class="event-header"><div style="flex:1"><div class="event-badges"><span style="font-size:17px">${ev.emoji||"🎯"}</span><span class="cat-badge" style="color:${c};background:${c}22">${ev.category||"活動"}</span><span class="live-event-badge">🔴 自動更新</span></div><h3 class="event-name">${ev.name}</h3><p class="event-desc">${ev.description||""}</p><div class="date-badge"><span style="font-size:10px">📆</span><span style="font-size:10px;color:#cbd5e1">${ev.dateDesc||""}</span></div><div class="event-meta">${ev.hours?`<span>🕐 ${ev.hours}</span>`:""}${ev.location?`<span>📍 ${ev.location}</span>`:""}${ev.price?`<span>💰 ${ev.price}</span>`:""}</div></div><div class="dist-badge" style="background:${c}22;border:1px solid ${c}44"><div class="dist-num" style="color:${c}">${ev.distance}</div><div class="dist-unit">公里</div></div></div>${ev.address?`<a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ev.address)}" target="_blank" class="directions-btn" style="background:${c}18;border:1px solid ${c}44;color:${c}">🗺️ 查看路線</a>`:""}</div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById("results").innerHTML=html;
}

function toggleDay(di){expandedDay=expandedDay===di?null:di;renderWeek();}

function renderSupermarkets(){
  document.getElementById("supermarkets").innerHTML=SUPERMARKETS.map(s=>`
    <div class="supermarket-card" style="background:rgba(255,255,255,0.04);border:1px solid ${s.color}33;border-left:4px solid ${s.color}">
      <div class="super-header"><span style="font-size:28px">${s.emoji}</span><div><div class="super-name">${s.name}</div><div class="super-tag">${s.tagline}</div></div></div>
      ${s.links.map(l=>`<a href="${l.url}" target="_blank" class="super-link" style="background:${s.color}15;border:1px solid ${s.color}33"><span class="icon">${l.icon}</span><span class="text">${l.label}</span><span class="arrow" style="color:${s.color}">→</span></a>`).join("")}
    </div>`).join("");
}

function switchTab(tab,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-events").style.display=tab==="events"?"block":"none";
  document.getElementById("tab-supermarket").style.display=tab==="supermarket"?"block":"none";
}
</script>
</body>
</html>
