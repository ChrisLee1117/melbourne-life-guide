<title>墨爾本生活助手</title>
<link rel="manifest" href="/manifest.json"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a 0%,#0d1b3e 50%,#0a0a1a 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#e2e8f0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.header{background:linear-gradient(180deg,rgba(124,58,237,0.3) 0%,transparent 100%);padding:28px 20px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-size:clamp(20px,5vw,34px);font-weight:900;background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.header p{color:#94a3b8;margin-top:6px;font-size:12px}
.live-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:20px;padding:3px 10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite}
.live-text{font-size:10px;color:#fca5a5;font-weight:600}
#installBanner{display:none;background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(79,70,229,0.25));border-bottom:1px solid rgba(124,58,237,0.3);padding:12px 16px;align-items:center;gap:12px}
.install-icon{font-size:28px;flex-shrink:0}
.install-text{flex:1}
.install-title{font-size:13px;font-weight:700;color:#c4b5fd}
.install-sub{font-size:11px;color:#64748b;margin-top:2px}
.install-btn{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.close-btn{background:none;border:none;color:#475569;font-size:18px;cursor:pointer;padding:4px}
.tabs{display:flex;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 8px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s}
.tab.active{background:rgba(124,58,237,0.2);border-bottom-color:#7c3aed}
.tab .label{font-size:14px;font-weight:700;color:#64748b}
.tab.active .label{color:#c4b5fd}
.tab .sub{font-size:10px;color:#475569}
.tab.active .sub{color:#7c3aed}
.content{max-width:560px;margin:0 auto;padding:16px 14px 80px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:16px;margin-bottom:12px}
label{font-size:10px;font-weight:700;letter-spacing:2px;color:#7c3aed;text-transform:uppercase;display:block;margin-bottom:7px}
input[type=text],input[type=date]{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:11px;padding:11px 14px;color:#fff;font-size:15px;outline:none;margin-bottom:11px;-webkit-appearance:none}
input::placeholder{color:#4a5568}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer}
.btn-primary{width:100%;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:11px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(124,58,237,0.4);-webkit-tap-highlight-color:transparent}
.btn-today{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:10px;padding:10px 11px;color:#c4b5fd;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.summary{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);border-radius:13px;padding:12px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.day-btn{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.2s;margin-bottom:7px;-webkit-tap-highlight-color:transparent}
.day-btn.open{background:rgba(124,58,237,0.18);border-color:rgba(124,58,237,0.4)}
.day-label{font-size:15px;font-weight:800;color:#e2e8f0}
.day-label.today{color:#f59e0b}
.day-label.tomorrow{color:#c4b5fd}
.day-date{font-size:11px;color:#64748b}
.day-count{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;color:#475569}
.day-count.has-events{background:rgba(124,58,237,0.3);border-color:rgba(124,58,237,0.5);color:#c4b5fd}
.chevron{color:#475569;font-size:13px;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.event-card{background:rgba(255,255,255,0.04);border-radius:13px;padding:14px;margin-bottom:7px;animation:fadeUp 0.3s ease both}
.event-header{display:flex;justify-content:space-between;align-items:flex-start;gap:9px}
.event-badges{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.cat-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.event-name{margin:0 0 4px;font-size:14px;font-weight:800;color:#f1f5f9;line-height:1.3}
.event-name-en{font-size:11px;font-weight:500;color:#94a3b8;margin-bottom:4px}
.event-desc{margin:0 0 6px;font-size:11px;color:#94a3b8;line-height:1.6}
.date-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;padding:3px 9px;margin-bottom:6px}
.event-meta{display:flex;flex-direction:column;gap:2px}
.event-meta span{font-size:11px;color:#cbd5e1}
.dist-badge{text-align:center;border-radius:9px;padding:7px 9px;flex-shrink:0;min-width:48px}
.dist-num{font-size:15px;font-weight:900}
.dist-unit{font-size:8px;color:#94a3b8;font-weight:600}
.directions-btn{display:block;border-radius:7px;padding:8px;text-decoration:none;font-size:11px;font-weight:700;text-align:center}
.empty-day{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:11px;padding:18px;text-align:center;color:#475569;font-size:13px}
.supermarket-card{border-radius:16px;padding:16px;margin-bottom:14px}
.super-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.super-name{font-size:18px;font-weight:900;color:#f1f5f9}
.super-tag{font-size:11px;color:#64748b}
.super-link{display:flex;align-items:center;gap:10px;border-radius:10px;padding:11px 14px;text-decoration:none;transition:all 0.2s;margin-bottom:8px}
.super-link .icon{font-size:18px}
.super-link .text{font-size:14px;font-weight:600;color:#e2e8f0;flex:1}
.info-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;text-align:center;margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease}
.modal-overlay.closing{animation:fadeOut 0.2s ease forwards}
.modal-sheet{background:linear-gradient(180deg,#1a1035 0%,#0d1b3e 100%);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease}
.modal-sheet.closing{animation:slideDown 0.25s ease forwards}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px}
.modal-close{background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:32px;height:32px;color:#94a3b8;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.modal-title{font-size:20px;font-weight:900;color:#f1f5f9;line-height:1.2;margin:0}
.modal-section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:14px;margin-bottom:10px}
.modal-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#7c3aed;text-transform:uppercase;margin-bottom:6px}
.modal-value{font-size:13px;color:#cbd5e1;line-height:1.6;white-space:pre-wrap}
.modal-btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;box-sizing:border-box}
.modal-photo{width:100%;height:180px;object-fit:cover;border-radius:14px;margin-bottom:14px}
.modal-photo-skeleton{width:100%;height:180px;border-radius:14px;margin-bottom:14px;background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}

</head>

<div id="installBanner">
  <div class="install-icon">📱</div>
  <div class="install-text">
    <div class="install-title">加入主畫面，隨時使用</div>
    <div class="install-sub">安裝後可離線瀏覽，像原生 App 一樣</div>
  </div>
  <button class="install-btn" id="installBtn">安裝</button>
  <button class="close-btn" onclick="dismissInstall()">✕</button>
</div>

<div class="header">
  <div style="font-size:11px;letter-spacing:4px;color:#7c3aed;font-weight:700;margin-bottom:5px;text-transform:uppercase">🇦🇺 墨爾本生活助手</div>
  <h1>Melbourne Life Guide</h1>
  <p>自動更新活動 · 超市特價 · 按距離排序</p>
  <div class="live-badge">
    <span class="live-dot"></span>
    <span class="live-text" id="lastUpdatedBadge">載入中...</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('events',this)">
    <div class="label">🗓️ 活動</div>
    <div class="sub">7天行程</div>
  </button>
  <button class="tab" onclick="switchTab('supermarket',this)">
    <div class="label">🛒 超市特價</div>
    <div class="sub">Woolies · Coles</div>
  </button>
</div>

<div id="tab-events" class="content">
  <div class="card">
    <label>📍 你的地區</label>
    <input type="text" id="suburb" placeholder="例如：Clayton、Box Hill、Fitzroy..." onkeydown="if(event.key==='Enter')doSearch()"/>
    <label>📅 開始日期</label>
    <div style="display:flex;gap:8px;margin-bottom:11px">
      <input type="date" id="startDate" style="margin-bottom:0;flex:1"/>
      <button class="btn-today" id="todayBtn" onclick="goToday()">今天</button>
    </div>
    <div id="searchError" style="color:#fca5a5;font-size:12px;margin-bottom:9px;display:none"></div>
    <button class="btn-primary" onclick="doSearch()">🔍 搜尋活動</button>
  </div>
  <div id="results"></div>
</div>

<div id="tab-supermarket" class="content" style="display:none">
  <div class="card" style="text-align:center">
    <div style="font-size:13px;color:#94a3b8;line-height:1.6">📅 特價每週三更新，點擊直接跳去官網查看最新優惠</div>
  </div>
  <div id="supermarkets"></div>
  <div class="info-box">
    <div style="font-size:12px;color:#475569;line-height:1.7">💡 想搜尋本週特價詳情？<br/><span style="color:#7c3aed">傳一句「搜尋今週Woolworths特價」畀Claude</span></div>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div id="modalEmoji" style="font-size:28px;margin-bottom:6px"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalPhotoSkeleton" class="modal-photo-skeleton" style="display:none"></div>
    <img id="modalPhoto" class="modal-photo" style="display:none" alt="活動圖片"/>
    <div id="modalCatBadge" style="margin-bottom:14px"></div>
    <div class="modal-section" id="modalHighlightSection" style="border-color:rgba(124,58,237,0.3)">
      <div class="modal-label" style="color:#a78bfa">✨ 有咩特別 · What to do</div>
      <div id="modalHighlights" class="modal-value"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">📆 日期 / Date</div>
      <div class="modal-value" id="modalDate"></div>
    </div>
    <div class="modal-section" id="modalHoursSection">
      <div class="modal-label">🕐 時間 / Hours</div>
      <div class="modal-value" id="modalHours"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">📍 地點 / Location</div>
      <div class="modal-value" id="modalLocation"></div>
    </div>
    <div class="modal-section" id="modalPriceSection" style="display:none">
      <div class="modal-label">💰 費用 / Price</div>
      <div class="modal-value" id="modalPrice"></div>
    </div>
    <a id="modalMapBtn" href="#" target="_blank" class="modal-btn" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;margin-top:6px">🗺️ Google Maps 路線</a>
  </div>
</div>

function getCoords(input) {
  var key = input.toLowerCase().trim();
  if (SUBURB_COORDS[key]) return SUBURB_COORDS[key];
  for (var k in SUBURB_COORDS) {
    if (k.indexOf(key) >= 0 || key.indexOf(k) >= 0) return SUBURB_COORDS[k];
  }
  return {lat:-37.8136, lng:144.9631};
}

function getDist(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function isEventOn(ev, date) {
  var dow = date.getDay();
  if (!ev.daysOfWeek || ev.daysOfWeek.indexOf(dow) < 0) return false;
  if (ev.fixedStart) {
    var d = new Date(date); d.setHours(0,0,0,0);
    var s = new Date(ev.fixedStart+"T00:00:00"); s.setHours(0,0,0,0);
    var e = new Date(ev.fixedEnd+"T00:00:00"); e.setHours(0,0,0,0);
    return d >= s && d <= e;
  }
  var m = date.getMonth(), dy = date.getDate();
  if (!ev.months || ev.months.indexOf(m) < 0) return false;
  return true;
}

  if (!suburb) {
    errEl.style.display = "block";
    errEl.textContent = "⚠️ 請輸入你的地區 Please enter your suburb";
    return;
  }
  errEl.style.display = "none";
  renderWeek();
}

function renderWeek() {
  var suburb = document.getElementById("suburb").value.trim();
  var startDate = document.getElementById("startDate").value;
  var coords = getCoords(suburb);
  var base = new Date(startDate + "T00:00:00");
  base.setHours(0,0,0,0);
  currentWeek = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(base);
    d.setDate(base.getDate() + i);
    var events = [];
    for (var j = 0; j < allEvents.length; j++) {
      var ev = allEvents[j];
      if (isEventOn(ev, d)) {
        var evCopy = {};
        for (var k in ev) evCopy[k] = ev[k];
        evCopy.distance = getDist(coords.lat, coords.lng, ev.venueLat || -37.8136, ev.venueLng || 144.9631);
        events.push(evCopy);
      }
    }
    events.sort(function(a,b){ return parseFloat(a.distance)-parseFloat(b.distance); });
    currentWeek.push({date:d, events:events});
  }

  var total = 0;
  for (var i = 0; i < currentWeek.length; i++) total += currentWeek[i].events.length;

  var html = '<div class="summary"><div><div style="font-size:11px;color:#94a3b8"><strong style="color:#e2e8f0">' + suburb + '</strong> 附近7天</div><div style="font-size:19px;font-weight:800;color:#c4b5fd">共 ' + total + ' 個活動</div></div><div style="font-size:28px">🗓️</div></div>';

  for (var i = 0; i < currentWeek.length; i++) {
    var day = currentWeek[i];
    var isOpen = (expandedDay === i);
    var label = getDayLabel(i);
    var dateStr = day.date.toLocaleDateString("zh-TW", {month:"long", day:"numeric"});
    html += '<div><button class="day-btn ' + (isOpen?"open":"") + '" onclick="toggleDay(' + i + ')"><div><div class="day-label ' + (i===0?"today":i===1?"tomorrow":"") + '">' + label + '</div><div class="day-date">' + dateStr + '</div></div><div style="display:flex;align-items:center;gap:7px"><span class="day-count ' + (day.events.length>0?"has-events":"") + '">' + day.events.length + '</span><span class="chevron ' + (isOpen?"open":"") + '">▼</span></div></button><div style="display:' + (isOpen?"block":"none") + ';margin-top:5px">';
    if (day.events.length === 0) {
      html += '<div class="empty-day">😴 今天沒有活動 No events today</div>';
    } else {
      for (var j = 0; j < day.events.length; j++) {
        var ev = day.events[j];
        var c = ev.color || "#7c3aed";
        html += '<div class="event-card" style="border:1px solid ' + c + '33;border-left:4px solid ' + c + ';animation-delay:' + (j*0.04) + 's">';
        html += '<div class="event-header"><div style="flex:1">';
        html += '<div class="event-badges"><span style="font-size:17px">' + (ev.emoji||"🎯") + '</span><span class="cat-badge" style="color:' + c + ';background:' + c + '22">' + (ev.category||"活動") + '</span></div>';
        html += '<div class="event-name">' + ev.name + '</div>';
        if (ev.nameEn) html += '<div class="event-name-en">' + ev.nameEn + '</div>';
        html += '<div class="date-badge"><span style="font-size:10px">📆</span><span style="font-size:10px;color:#cbd5e1">' + (ev.dateDesc||"") + '</span></div>';
        html += '<div class="event-meta">';
        if (ev.hours) html += '<span>🕐 ' + ev.hours + '</span>';
        if (ev.location) html += '<span>📍 ' + ev.location + '</span>';
        html += '</div></div>';
        html += '<div class="dist-badge" style="background:' + c + '22;border:1px solid ' + c + '44"><div class="dist-num" style="color:' + c + '">' + ev.distance + '</div><div class="dist-unit">km</div></div>';
        html += '</div>';
        html += '<div style="display:flex;gap:8px;margin-top:9px">';
        if (ev.address) html += '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(ev.address) + '" target="_blank" class="directions-btn" style="flex:1;background:' + c + '18;border:1px solid ' + c + '44;color:' + c + '">🗺️ Maps</a>';
        html += '<button onclick="showDetail(' + ev.id + ')" style="flex:1;background:linear-gradient(135deg,' + c + 'cc,' + c + '99);border:none;border-radius:7px;padding:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 詳細 / Detail</button>';
        html += '</div></div>';
      }
    }
    html += '</div></div>';
  }
  document.getElementById("results").innerHTML = html;
}

function toggleDay(di) {
  expandedDay = (expandedDay === di) ? null : di;
  renderWeek();
}

function showDetail(id) {
  var ev = null;
  for (var i = 0; i < allEvents.length; i++) {
    if (allEvents[i].id === id) { ev = allEvents[i]; break; }
  }
  if (!ev) return;
  var c = ev.color || "#7c3aed";

  document.getElementById("modalEmoji").textContent = ev.emoji || "🎯";
  document.getElementById("modalTitle").innerHTML = ev.name + (ev.nameEn ? '<div style="font-size:13px;font-weight:500;opacity:0.6;margin-top:3px">' + ev.nameEn + '</div>' : "");
  document.getElementById("modalCatBadge").innerHTML = '<span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:' + c + ';background:' + c + '22;padding:3px 10px;border-radius:20px">' + (ev.category||"活動") + '</span>';

  var hlZH = ev.highlights || "";
  var hlEN = ev.highlightsEn || "";
  var combined = "";
  if (hlEN) combined += hlEN;
  if (hlZH && hlEN) combined += "\n\n";
  if (hlZH) combined += hlZH;
  document.getElementById("modalHighlights").textContent = combined || ev.description || "";

  var dateText = "";
  if (ev.dateDescEn) dateText += ev.dateDescEn;
  if (ev.dateDesc && ev.dateDescEn) dateText += "\n";
  if (ev.dateDesc) dateText += ev.dateDesc;
  document.getElementById("modalDate").textContent = dateText || ev.dateDesc || "";

  document.getElementById("modalHours").textContent = ev.hours || "";
  document.getElementById("modalHoursSection").style.display = ev.hours ? "block" : "none";
  document.getElementById("modalLocation").textContent = (ev.location||"") + (ev.address ? "\n" + ev.address : "");

  if (ev.price) {
    document.getElementById("modalPrice").textContent = ev.price;
    document.getElementById("modalPriceSection").style.display = "block";
  } else {
    document.getElementById("modalPriceSection").style.display = "none";
  }

  var mapUrl = ev.address
    ? "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(ev.address)
    : "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(ev.name + " Melbourne");
  document.getElementById("modalMapBtn").href = mapUrl;
  document.getElementById("modalSheet").style.borderTop = "3px solid " + c;

  // Photo
  var photoEl = document.getElementById("modalPhoto");
  var skelEl = document.getElementById("modalPhotoSkeleton");
  photoEl.style.display = "none";
  skelEl.style.display = "block";
  var photoUrl = PHOTO_MAP[ev.category] || "https://images.unsplash.com/photo-1514565131-fce0801e6785?w=800&h=400&fit=crop";
  for (var k in NAME_PHOTO_MAP) {
    if (ev.name.indexOf(k) >= 0) { photoUrl = NAME_PHOTO_MAP[k]; break; }
  }
  var img = new Image();
  img.onload = function() { photoEl.src = photoUrl; photoEl.style.display = "block"; skelEl.style.display = "none"; };
  img.onerror = function() { skelEl.style.display = "none"; };
  img.src = photoUrl;

  document.getElementById("modalOverlay").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  var overlay = document.getElementById("modalOverlay");
  var sheet = document.getElementById("modalSheet");
  overlay.classList.add("closing");
  sheet.classList.add("closing");
  setTimeout(function() {
    overlay.style.display = "none";
    overlay.classList.remove("closing");
    sheet.classList.remove("closing");
    document.body.style.overflow = "";
  }, 220);
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

function renderSupermarkets() {
  var html = "";
  for (var i = 0; i < SUPERMARKETS.length; i++) {
    var s = SUPERMARKETS[i];
    html += '<div class="supermarket-card" style="background:rgba(255,255,255,0.04);border:1px solid ' + s.color + '33;border-left:4px solid ' + s.color + '">';
    html += '<div class="super-header"><span style="font-size:28px">' + s.emoji + '</span><div><div class="super-name">' + s.name + '</div><div class="super-tag">' + s.tagline + '</div></div></div>';
    for (var j = 0; j < s.links.length; j++) {
      var l = s.links[j];
      html += '<a href="' + l.url + '" target="_blank" class="super-link" style="background:' + s.color + '15;border:1px solid ' + s.color + '33"><span class="icon">' + l.icon + '</span><span class="text">' + l.label + '</span><span style="color:' + s.color + '">→</span></a>';
    }
    html += '</div>';
  }
  document.getElementById("supermarkets").innerHTML = html;
}

function switchTab(tab, btn) {
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  btn.classList.add("active");
  document.getElementById("tab-events").style.display = (tab === "events") ? "block" : "none";
  document.getElementById("tab-supermarket").style.display = (tab === "supermarket") ? "block" : "none";
}

function dismissInstall() {
  document.getElementById("installBanner").style.display = "none";
  localStorage.setItem("installDismissed","1");
}

// Init
var todayStr = new Date().toISOString().slice(0,10);
document.getElementById("startDate").value = todayStr;
document.getElementById("startDate").addEventListener("change", function() {
  updateTodayBtn();
  if (document.getElementById("suburb").value.trim() && currentWeek.length) renderWeek();
});
updateTodayBtn();
document.getElementById("lastUpdatedBadge").textContent = "活動資料：2026年6月";
renderSupermarkets();

// PWA
var deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem("installDismissed")) document.getElementById("installBanner").style.display = "flex";
});
document.getElementById("installBtn").addEventListener("click", function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
  document.getElementById("installBanner").style.display = "none";
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(function(){});
}
</script>
