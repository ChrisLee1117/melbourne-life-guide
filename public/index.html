async function loadEvents(){

}]}
Include music, exhibitions, markets, food, festivals. daysOfWeek: 0=Sun,1=Mon...6=Sat.`}]
      })
    });
    const data=await res.json();

}

function getCoords(input){
  const key=input.toLowerCase().trim();
  if(SUBURB_COORDS[key]) return SUBURB_COORDS[key];
  for(const [k,v] of Object.entries(SUBURB_COORDS)) if(k.includes(key)||key.includes(k)) return v;
  return {lat:-37.8136,lng:144.9631};
}
function getDist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}
function isEventOn(ev,date){
  const dow=date.getDay();
  if(!ev.daysOfWeek||!ev.daysOfWeek.includes(dow)) return false;
  if(ev.fixedStart){
    const d=new Date(date); d.setHours(0,0,0,0);
    const s=new Date(ev.fixedStart+"T00:00:00"); s.setHours(0,0,0,0);
    const e=new Date(ev.fixedEnd+"T00:00:00"); e.setHours(0,0,0,0);
    return d>=s&&d<=e;
  }
  const m=date.getMonth(),dy=date.getDate();
  if(!ev.months||!ev.months.includes(m)) return false;
  const sm=ev.months[0],em=ev.months[ev.months.length-1];
  if(sm===em) return dy>=ev.dayStart&&dy<=ev.dayEnd;
  if(m===sm) return dy>=ev.dayStart;
  if(m===em) return dy<=ev.dayEnd;
  return true;
}
function getDayLabel(date,i){if(i===0)return"今天";if(i===1)return"明天";return date.toLocaleDateString("zh-TW",{weekday:"long"});}

function renderWeek(){
  const suburb=document.getElementById("suburb").value.trim();

  const coords=getCoords(suburb);
  const base=new Date(startDate+"T00:00:00"); base.setHours(0,0,0,0);
  currentWeek=Array.from({length:7},(_,i)=>{
    const d=new Date(base); d.setDate(base.getDate()+i);
    const events=allEvents.filter(ev=>isEventOn(ev,d)).map(ev=>({...ev,distance:getDist(coords.lat,coords.lng,ev.venueLat||-37.8136,ev.venueLng||144.9631)})).sort((a,b)=>parseFloat(a.distance)-parseFloat(b.distance));
    return{date:d,label:getDayLabel(d,i),dateStr:d.toLocaleDateString("zh-TW",{month:"long",day:"numeric"}),events};
  });
  const total=currentWeek.reduce((s,d)=>s+d.events.length,0);
  let html=`<div class="summary"><div><div style="font-size:11px;color:#94a3b8"><strong style="color:#e2e8f0">${suburb}</strong> 附近7天</div><div style="font-size:19px;font-weight:800;color:#c4b5fd">共 ${total} 個活動</div></div><div style="font-size:28px">🗓️</div></div>`;
  currentWeek.forEach((day,di)=>{

    html+=`<div><button class="day-btn ${isOpen?"open":""}" onclick="toggleDay(${di})"><div><div class="day-label ${di===0?"today":di===1?"tomorrow":""}">${day.label}</div><div class="day-date">${day.dateStr}</div></div><div style="display:flex;align-items:center;gap:7px"><span class="day-count ${day.events.length>0?"has-events":""}">${day.events.length} 個</span><span class="chevron ${isOpen?"open":""}">▼</span></div></button><div style="display:${isOpen?"block":"none"};margin-top:5px">`;
    if(day.events.length===0){html+=`<div class="empty-day">😴 今天沒有活動</div>`;}
    else day.events.forEach((ev,ei)=>{
      const c=ev.color||"#7c3aed";
      html+=`<div class="event-card" style="border:1px solid ${c}33;border-left:4px solid ${c};animation-delay:${ei*0.04}s"><div class="event-header"><div style="flex:1"><div class="event-badges"><span style="font-size:17px">${ev.emoji||"🎯"}</span><span class="cat-badge" style="color:${c};background:${c}22">${ev.category||"活動"}</span><span class="live-event-badge">🔴 自動更新</span></div><h3 class="event-name">${ev.name}</h3><p class="event-desc">${ev.description||""}</p><div class="date-badge"><span style="font-size:10px">📆</span><span style="font-size:10px;color:#cbd5e1">${ev.dateDesc||""}</span></div><div class="event-meta">${ev.hours?`<span>🕐 ${ev.hours}</span>`:""}${ev.location?`<span>📍 ${ev.location}</span>`:""}${ev.price?`<span>💰 ${ev.price}</span>`:""}</div></div><div class="dist-badge" style="background:${c}22;border:1px solid ${c}44"><div class="dist-num" style="color:${c}">${ev.distance}</div><div class="dist-unit">公里</div></div></div><div style="display:flex;gap:8px;margin-top:9px">${ev.address?`<a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ev.address)}" target="_blank" class="directions-btn" style="flex:1;background:${c}18;border:1px solid ${c}44;color:${c}">🗺️ 路線</a>`:""}<button onclick="showDetail(${ev.id})" style="flex:1;background:linear-gradient(135deg,${c}cc,${c}99);border:none;border-radius:7px;padding:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 詳細資料</button></div></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById("results").innerHTML=html;
