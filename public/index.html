<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>墨爾本生活助手</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0ea5e9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Melbourne"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(180deg,#e0f7fa 0%,#b2ebf2 30%,#e0f2fe 70%,#f0f9ff 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#0c4a6e;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* Header */
.header{background:linear-gradient(135deg,#0ea5e9 0%,#06b6d4 50%,#0891b2 100%);padding:32px 20px 22px;text-align:center;border-bottom:none;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(6,182,212,0.3)}
.header::before{content:'';position:absolute;top:-50%;left:-20%;width:140%;height:200%;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.2) 0%,transparent 60%)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#67e8f9,#38bdf8,#0ea5e9,#38bdf8,#67e8f9)}
.header h1{font-size:clamp(22px,5vw,36px);font-weight:900;color:#ffffff;-webkit-text-fill-color:#ffffff;line-height:1.1;letter-spacing:-0.5px;text-shadow:0 2px 12px rgba(0,0,0,0.15)}
.header p{color:rgba(255,255,255,0.85);margin-top:6px;font-size:12px;letter-spacing:0.5px}
.live-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 12px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
.live-text{font-size:10px;color:#fff;font-weight:600;letter-spacing:0.5px}

/* Install banner */
#installBanner{display:none;background:#e0f7fa;border-bottom:2px solid #b2ebf2;padding:12px 16px;align-items:center;gap:12px}
.install-icon{font-size:28px;flex-shrink:0}
.install-text{flex:1}
.install-title{font-size:13px;font-weight:700;color:#0e7490}
.install-sub{font-size:11px;color:#64748b;margin-top:2px}
.install-btn{background:linear-gradient(135deg,#0ea5e9,#0891b2);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.close-btn{background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:4px}

/* Tabs */
.tabs{display:flex;background:#ffffff;border-bottom:2px solid #bae6fd;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(14,165,233,0.1)}
.tab{flex:1;padding:12px 8px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(180deg,#e0f7fa,#fff);border-bottom-color:#0ea5e9}
.tab .label{font-size:14px;font-weight:700;color:#94a3b8}
.tab.active .label{color:#0e7490}
.tab .sub{font-size:10px;color:#cbd5e1}
.tab.active .sub{color:#38bdf8}

/* Content */
.content{max-width:560px;margin:0 auto;padding:16px 14px 80px}

/* Cards */
.card{background:#ffffff;border:1.5px solid #bae6fd;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(14,165,233,0.1)}
label{font-size:10px;font-weight:700;letter-spacing:2px;color:#0e7490;text-transform:uppercase;display:block;margin-bottom:7px}
input[type=text],input[type=date]{width:100%;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:12px 14px;color:#0c4a6e;font-size:15px;outline:none;margin-bottom:11px;-webkit-appearance:none;transition:border-color 0.2s}
input:focus{border-color:#0ea5e9}
input::placeholder{color:#94a3b8}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4) sepia(1) saturate(3) hue-rotate(180deg);cursor:pointer}
.btn-primary{width:100%;background:linear-gradient(135deg,#0ea5e9,#0891b2);border:none;border-radius:13px;padding:14px;color:#ffffff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(14,165,233,0.35);-webkit-tap-highlight-color:transparent;letter-spacing:0.3px;transition:transform 0.1s}
.btn-primary:active{transform:scale(0.98)}
.btn-today{background:#e0f7fa;border:1.5px solid #67e8f9;border-radius:10px;padding:10px 11px;color:#0e7490;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}

/* Summary */
.summary{background:linear-gradient(135deg,#e0f7fa,#f0f9ff);border:1.5px solid #7dd3fc;border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(14,165,233,0.12)}

/* Day buttons */
.day-btn{width:100%;background:#ffffff;border:1.5px solid #e2e8f0;border-radius:15px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.2s;margin-bottom:8px;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.day-btn:hover{border-color:#7dd3fc}
.day-btn.open{background:linear-gradient(135deg,#e0f7fa,#f0f9ff);border-color:#0ea5e9;box-shadow:0 2px 12px rgba(14,165,233,0.15)}
.day-label{font-size:15px;font-weight:800;color:#0c4a6e}
.day-label.today{color:#d97706}
.day-label.tomorrow{color:#0e7490}
.day-date{font-size:11px;color:#94a3b8}
.day-count{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;color:#94a3b8}
.day-count.has-events{background:#e0f7fa;border-color:#0ea5e9;color:#0e7490}
.chevron{color:#94a3b8;font-size:13px;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}

/* Event cards */
.event-card{background:#ffffff;border-radius:18px;padding:16px;margin-bottom:10px;animation:fadeUp 0.3s ease both;box-shadow:0 3px 14px rgba(14,165,233,0.1);border:1px solid rgba(186,230,253,0.6)}
.event-header{display:flex;justify-content:space-between;align-items:flex-start;gap:9px}
.event-badges{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.cat-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.event-name{margin:0 0 3px;font-size:16px;font-weight:800;color:#0c4a6e;line-height:1.3}
.event-name-en{font-size:11px;font-weight:500;color:#38bdf8;margin-bottom:5px;letter-spacing:0.2px}
.event-desc{margin:0 0 6px;font-size:11px;color:#64748b;line-height:1.6}
.date-badge{display:inline-flex;align-items:center;gap:4px;background:#e0f7fa;border:1px solid #67e8f9;border-radius:7px;padding:3px 9px;margin-bottom:6px}
.event-meta{display:flex;flex-direction:column;gap:3px}
.event-meta span{font-size:11px;color:#64748b}
.dist-badge{text-align:center;border-radius:12px;padding:8px 9px;flex-shrink:0;min-width:54px;background:linear-gradient(135deg,#e0f7fa,#f0f9ff);border:1.5px solid #7dd3fc}
.dist-num{font-size:15px;font-weight:900}
.dist-unit{font-size:8px;color:#94a3b8;font-weight:600}
.directions-btn{display:block;border-radius:9px;padding:9px;text-decoration:none;font-size:11px;font-weight:700;text-align:center}
.empty-day{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:13px;padding:20px;text-align:center;color:#94a3b8;font-size:13px}

/* Supermarket */
.supermarket-card{border-radius:18px;padding:16px;margin-bottom:14px}
.super-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.super-name{font-size:18px;font-weight:900;color:#0c4a6e}
.super-tag{font-size:11px;color:#64748b}
.super-link{display:flex;align-items:center;gap:10px;border-radius:11px;padding:11px 14px;text-decoration:none;transition:all 0.2s;margin-bottom:8px}
.super-link .icon{font-size:18px}
.super-link .text{font-size:14px;font-weight:600;color:#0c4a6e;flex:1}
.info-box{background:#e0f7fa;border:1.5px solid #67e8f9;border-radius:13px;padding:14px;text-align:center;margin-top:6px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(12,74,110,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px)}
.modal-overlay.closing{animation:fadeOut 0.2s ease forwards}
.modal-sheet{background:linear-gradient(180deg,#ffffff 0%,#f0f9ff 100%);border-radius:28px 28px 0 0;padding:20px 20px 40px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;animation:slideUp 0.3s ease;box-shadow:0 -8px 40px rgba(14,165,233,0.2)}
.modal-sheet.closing{animation:slideDown 0.25s ease forwards}
.modal-handle{width:40px;height:4px;background:#bae6fd;border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px}
.modal-close{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:50%;width:34px;height:34px;color:#0e7490;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.modal-title{font-size:20px;font-weight:900;color:#0c4a6e;line-height:1.2;margin:0}
.modal-section{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:14px;padding:14px;margin-bottom:10px}
.modal-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#0e7490;text-transform:uppercase;margin-bottom:6px}
.modal-value{font-size:13px;color:#334155;line-height:1.6;white-space:pre-wrap}
.modal-btn{display:block;width:100%;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;box-sizing:border-box}
.modal-photo{width:100%;height:180px;object-fit:cover;border-radius:16px;margin-bottom:14px}
.modal-photo-skeleton{width:100%;height:180px;border-radius:16px;margin-bottom:14px;background:linear-gradient(90deg,#e0f7fa 25%,#b2ebf2 50%,#e0f7fa 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

/* Deals */
.deals-cat{font-size:10px;font-weight:700;letter-spacing:2px;color:#0e7490;text-transform:uppercase;padding:16px 0 8px;margin-top:4px}
.deal-card{background:#ffffff;border:1.5px solid #bae6fd;border-radius:18px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 3px 12px rgba(14,165,233,0.08)}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--deal-color,#0ea5e9)}
.deal-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.deal-emoji{font-size:26px;flex-shrink:0}
.deal-brand{font-size:15px;font-weight:800;color:#0c4a6e}
.deal-tag{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-left:auto}
.deal-title{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:4px}
.deal-desc{font-size:11px;color:#64748b;line-height:1.6;margin-bottom:8px}
.deal-how{background:#e0f7fa;border-radius:10px;padding:10px 12px;font-size:11px;color:#0e7490;line-height:1.7}
.deal-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:700;color:#0ea5e9;text-decoration:none}
.deal-frequency{font-size:10px;color:#94a3b8;margin-top:6px}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
</style>
</head>

</div>

</div>

<div id="tab-events" class="content">

    <input type="text" id="suburb" placeholder="例如：Clayton、Box Hill、Fitzroy..." onkeydown="if(event.key==='Enter')doSearch()"/>

    <div style="display:flex;gap:8px;margin-bottom:11px">
      <input type="date" id="startDate" style="margin-bottom:0;flex:1"/>

    <button class="btn-primary" onclick="doSearch()">🔍 搜尋活動</button>
  </div>
  <div id="results"></div>
</div>

<div id="tab-supermarket" class="content" style="display:none">
  <div class="card" style="text-align:center">
    <div style="font-size:13px;color:#94a3b8;line-height:1.6">📅 特價每週三更新，點擊直接跳去官網查看最新優惠</div>
  </div>
  <div id="supermarkets"></div>
  <div class="info-box">

  </div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div id="modalEmoji" style="font-size:28px;margin-bottom:6px"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalPhotoSkeleton" class="modal-photo-skeleton" style="display:none"></div>
    <img id="modalPhoto" class="modal-photo" style="display:none" alt="活動圖片"/>
    <div id="modalCatBadge" style="margin-bottom:14px"></div>
    <div class="modal-section" id="modalHighlightSection" style="border-color:rgba(124,58,237,0.3)">
      <div class="modal-label" style="color:#3b82f6">✨ 有咩特別 · What to do</div>
      <div id="modalHighlights" class="modal-value"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">📆 日期 / Date</div>
      <div class="modal-value" id="modalDate"></div>
    </div>
    <div class="modal-section" id="modalHoursSection">
      <div class="modal-label">🕐 時間 / Hours</div>
      <div class="modal-value" id="modalHours"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">📍 地點 / Location</div>
      <div class="modal-value" id="modalLocation"></div>
    </div>
    <div class="modal-section" id="modalPriceSection" style="display:none">
      <div class="modal-label">💰 費用 / Price</div>
      <div class="modal-value" id="modalPrice"></div>
    </div>
    <a id="modalMapBtn" href="#" target="_blank" class="modal-btn" style="background:linear-gradient(135deg,#3b82f6,#3b82f6);color:#fff;margin-top:6px">🗺️ Google Maps 路線</a>
  </div>
</div>

<div id="tab-deals" class="content" style="display:none">
  <div class="card" style="text-align:center;margin-bottom:16px">
    <div style="font-size:24px;margin-bottom:6px">🎁</div>
    <div style="font-size:14px;font-weight:700;color:#3b82f6;margin-bottom:4px">墨爾本著數大全</div>
    <div style="font-size:11px;color:#64748b;line-height:1.6">免費食物、步數獎勵、生日優惠、App著數</div>
  </div>
  <div id="dealsContent"></div>
</div>

var expandedDay = 0;
var currentWeek = [];

function getCoords(input) {
  var key = input.toLowerCase().trim();
  if (SUBURB_COORDS[key]) return SUBURB_COORDS[key];
  for (var k in SUBURB_COORDS) {
    if (k.indexOf(key) >= 0 || key.indexOf(k) >= 0) return SUBURB_COORDS[k];
  }
  return {lat:-37.8136, lng:144.9631};
}

function getDist(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function isEventOn(ev, date) {
  var dow = date.getDay();
  if (!ev.daysOfWeek || ev.daysOfWeek.indexOf(dow) < 0) return false;
  if (ev.fixedStart) {
    var d = new Date(date); d.setHours(0,0,0,0);
    var s = new Date(ev.fixedStart+"T00:00:00"); s.setHours(0,0,0,0);
    var e = new Date(ev.fixedEnd+"T00:00:00"); e.setHours(0,0,0,0);
    return d >= s && d <= e;
  }
  var m = date.getMonth(), dy = date.getDate();
  if (!ev.months || ev.months.indexOf(m) < 0) return false;
  return true;
}

function getDayLabel(i) {
  if (i === 0) return "今天 Today";
  if (i === 1) return "明天 Tomorrow";
  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var daysCN = ["週日","週一","週二","週三","週四","週五","週六"];
  var d = currentWeek[i].date;
  return daysCN[d.getDay()] + " " + days[d.getDay()];
}

function updateTodayBtn() {
  var v = document.getElementById("startDate").value;
  var t = new Date().toISOString().slice(0,10);
  document.getElementById("todayBtn").style.display = (v === t) ? "none" : "block";
}

function goToday() {
  document.getElementById("startDate").value = new Date().toISOString().slice(0,10);
  updateTodayBtn();
  if (document.getElementById("suburb").value.trim()) renderWeek();
}

function doSearch() {
  var suburb = document.getElementById("suburb").value.trim();
  var errEl = document.getElementById("searchError");
  if (!suburb) {
    errEl.style.display = "block";
    errEl.textContent = "⚠️ 請輸入你的地區 Please enter your suburb";
    return;
  }
  errEl.style.display = "none";
  renderWeek();
}

function renderWeek() {
  var suburb = document.getElementById("suburb").value.trim();
  var startDate = document.getElementById("startDate").value;
  var coords = getCoords(suburb);
  var base = new Date(startDate + "T00:00:00");
  base.setHours(0,0,0,0);
  currentWeek = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(base);
    d.setDate(base.getDate() + i);
    var events = [];
    for (var j = 0; j < allEvents.length; j++) {
      var ev = allEvents[j];
      if (isEventOn(ev, d)) {
        var evCopy = {};
        for (var k in ev) evCopy[k] = ev[k];
        evCopy.distance = getDist(coords.lat, coords.lng, ev.venueLat || -37.8136, ev.venueLng || 144.9631);
        events.push(evCopy);
      }
    }
    events.sort(function(a,b){ return parseFloat(a.distance)-parseFloat(b.distance); });
    currentWeek.push({date:d, events:events});
  }

  var total = 0;
  for (var i = 0; i < currentWeek.length; i++) total += currentWeek[i].events.length;

  var html = '<div class="summary"><div><div style="font-size:11px;color:#94a3b8"><strong style="color:#1e3a5f">' + suburb + '</strong> 附近7天</div><div style="font-size:19px;font-weight:800;color:#3b82f6">共 ' + total + ' 個活動</div></div><div style="font-size:28px">🗓️</div></div>';

  for (var i = 0; i < currentWeek.length; i++) {
    var day = currentWeek[i];
    var isOpen = (expandedDay === i);
    var label = getDayLabel(i);
    var dateStr = day.date.toLocaleDateString("zh-TW", {month:"long", day:"numeric"});
    html += '<div><button class="day-btn ' + (isOpen?"open":"") + '" onclick="toggleDay(' + i + ')"><div><div class="day-label ' + (i===0?"today":i===1?"tomorrow":"") + '">' + label + '</div><div class="day-date">' + dateStr + '</div></div><div style="display:flex;align-items:center;gap:7px"><span class="day-count ' + (day.events.length>0?"has-events":"") + '">' + day.events.length + '</span><span class="chevron ' + (isOpen?"open":"") + '">▼</span></div></button><div style="display:' + (isOpen?"block":"none") + ';margin-top:5px">';
    if (day.events.length === 0) {
      html += '<div class="empty-day">😴 今天沒有活動 No events today</div>';
    } else {
      for (var j = 0; j < day.events.length; j++) {
        var ev = day.events[j];
        var c = ev.color || "#0ea5e9";
        html += '<div class="event-card" style="border:1px solid ' + c + '33;border-left:4px solid ' + c + ';animation-delay:' + (j*0.04) + 's">';
        html += '<div class="event-header"><div style="flex:1">';
        html += '<div class="event-badges"><span style="font-size:17px">' + (ev.emoji||"🎯") + '</span><span class="cat-badge" style="color:' + c + ';background:' + c + '22">' + (ev.category||"活動") + '</span></div>';
        html += '<div class="event-name">' + ev.name + '</div>';
        if (ev.nameEn) html += '<div class="event-name-en">' + ev.nameEn + '</div>';
        html += '<div class="date-badge"><span style="font-size:10px">📆</span><span style="font-size:10px;color:#cbd5e1">' + (ev.dateDesc||"") + '</span></div>';
        html += '<div class="event-meta">';
        if (ev.hours) html += '<span>🕐 ' + ev.hours + '</span>';
        if (ev.location) html += '<span>📍 ' + ev.location + '</span>';
        html += '</div></div>';
        html += '<div class="dist-badge" style="background:' + c + '22;border:1px solid ' + c + '44"><div class="dist-num" style="color:' + c + '">' + ev.distance + '</div><div class="dist-unit">km</div></div>';
        html += '</div>';
        html += '<div style="display:flex;gap:8px;margin-top:9px">';
        if (ev.address) html += '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(ev.address) + '" target="_blank" class="directions-btn" style="flex:1;background:' + c + '18;border:1px solid ' + c + '44;color:' + c + '">🗺️ Maps</a>';
        html += '<button onclick="showDetail(' + ev.id + ')" style="flex:1;background:linear-gradient(135deg,' + c + 'cc,' + c + '99);border:none;border-radius:7px;padding:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 詳細 / Detail</button>';
        html += '</div></div>';
      }
    }
    html += '</div></div>';
  }
  document.getElementById("results").innerHTML = html;
}

function toggleDay(di) {
  expandedDay = (expandedDay === di) ? null : di;
  renderWeek();
}

function showDetail(id) {
  var ev = null;
  for (var i = 0; i < allEvents.length; i++) {
    if (allEvents[i].id === id) { ev = allEvents[i]; break; }
  }
  if (!ev) return;
  var c = ev.color || "#0ea5e9";

  document.getElementById("modalEmoji").textContent = ev.emoji || "🎯";
  document.getElementById("modalTitle").innerHTML = ev.name + (ev.nameEn ? '<div style="font-size:13px;font-weight:500;opacity:0.6;margin-top:3px">' + ev.nameEn + '</div>' : "");
  document.getElementById("modalCatBadge").innerHTML = '<span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:' + c + ';background:' + c + '22;padding:3px 10px;border-radius:20px">' + (ev.category||"活動") + '</span>';

  var hlZH = ev.highlights || "";
  var hlEN = ev.highlightsEn || "";
  var combined = "";
  if (hlEN) combined += hlEN;
  if (hlZH && hlEN) combined += "\n\n";
  if (hlZH) combined += hlZH;
  document.getElementById("modalHighlights").textContent = combined || ev.description || "";

  var dateText = "";
  if (ev.dateDescEn) dateText += ev.dateDescEn;
  if (ev.dateDesc && ev.dateDescEn) dateText += "\n";
  if (ev.dateDesc) dateText += ev.dateDesc;
  document.getElementById("modalDate").textContent = dateText || ev.dateDesc || "";

  document.getElementById("modalHours").textContent = ev.hours || "";
  document.getElementById("modalHoursSection").style.display = ev.hours ? "block" : "none";
  document.getElementById("modalLocation").textContent = (ev.location||"") + (ev.address ? "\n" + ev.address : "");

  if (ev.price) {
    document.getElementById("modalPrice").textContent = ev.price;
    document.getElementById("modalPriceSection").style.display = "block";
  } else {
    document.getElementById("modalPriceSection").style.display = "none";
  }

  var mapUrl = ev.address
    ? "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(ev.address)
    : "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(ev.name + " Melbourne");
  document.getElementById("modalMapBtn").href = mapUrl;
  document.getElementById("modalSheet").style.borderTop = "3px solid " + c;

  // Photo
  var photoEl = document.getElementById("modalPhoto");
  var skelEl = document.getElementById("modalPhotoSkeleton");
  photoEl.style.display = "none";
  skelEl.style.display = "block";
  var photoUrl = PHOTO_MAP[ev.category] || "https://images.unsplash.com/photo-1514565131-fce0801e6785?w=800&h=400&fit=crop";
  for (var k in NAME_PHOTO_MAP) {
    if (ev.name.indexOf(k) >= 0) { photoUrl = NAME_PHOTO_MAP[k]; break; }
  }
  var img = new Image();
  img.onload = function() { photoEl.src = photoUrl; photoEl.style.display = "block"; skelEl.style.display = "none"; };
  img.onerror = function() { skelEl.style.display = "none"; };
  img.src = photoUrl;

  document.getElementById("modalOverlay").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  var overlay = document.getElementById("modalOverlay");
  var sheet = document.getElementById("modalSheet");
  overlay.classList.add("closing");
  sheet.classList.add("closing");
  setTimeout(function() {
    overlay.style.display = "none";
    overlay.classList.remove("closing");
    sheet.classList.remove("closing");
    document.body.style.overflow = "";
  }, 220);
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

function renderSupermarkets() {
  var html = "";
  for (var i = 0; i < SUPERMARKETS.length; i++) {
    var s = SUPERMARKETS[i];
    html += '<div class="supermarket-card" style="background:rgba(255,255,255,0.04);border:1px solid ' + s.color + '33;border-left:4px solid ' + s.color + '">';
    html += '<div class="super-header"><span style="font-size:28px">' + s.emoji + '</span><div><div class="super-name">' + s.name + '</div><div class="super-tag">' + s.tagline + '</div></div></div>';
    for (var j = 0; j < s.links.length; j++) {
      var l = s.links[j];
      html += '<a href="' + l.url + '" target="_blank" class="super-link" style="background:' + s.color + '15;border:1px solid ' + s.color + '33"><span class="icon">' + l.icon + '</span><span class="text">' + l.label + '</span><span style="color:' + s.color + '">→</span></a>';
    }
    html += '</div>';
  }
  document.getElementById("supermarkets").innerHTML = html;
}

function switchTab(tab, btn) {
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  btn.classList.add("active");
  document.getElementById("tab-events").style.display = (tab === "events") ? "block" : "none";
  document.getElementById("tab-supermarket").style.display = (tab === "supermarket") ? "block" : "none";
  document.getElementById("tab-deals").style.display = (tab === "deals") ? "block" : "none";
}

async function loadEvents() {
  var badge = document.getElementById('lastUpdatedBadge');
  var today = new Date().toISOString().slice(0,10);
  var cacheKey = 'melb_events_v3_' + today;

  // Check cache
  try {
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
      var cdata = JSON.parse(cached);
      if (cdata.events && cdata.events.length > 0) {
        allEvents = cdata.events;
        badge.textContent = '已更新：' + today;
        return;
      }
    }
  } catch(e) {}

  badge.textContent = '🔄 搜尋最新活動...';
  try {
    var prompt = 'Today is ' + today + '. Search Google and find 10-15 REAL events in Melbourne Australia this week and next 2 weeks. Reply ONLY with valid JSON (no markdown): {"events":[{"id":1,"name":"中文名","nameEn":"English name","emoji":"🎭","category":"類別","color":"#0ea5e9","fixedStart":"YYYY-MM-DD","fixedEnd":"YYYY-MM-DD","daysOfWeek":[0,1,2,3,4,5,6],"hours":"時間","location":"場地","address":"地址 Melbourne VIC XXXX","venueLat":-37.8136,"venueLng":144.9631,"description":"中文簡介","dateDesc":"中文日期","dateDescEn":"English date","highlights":"4-5個insider tips繁體中文每行emoji開頭","highlightsEn":"4-5 insider tips English each line emoji"}]}';

    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ max_tokens: 6000, messages: [{ role: 'user', content: prompt }] })
    });
    var data = await res.json();
    var text = data.content[0].text;
    var jsonStart = text.indexOf('{');
    var jsonEnd = text.lastIndexOf('}');
    if (jsonStart >= 0 && jsonEnd >= 0) {
      var jsonStr = text.slice(jsonStart, jsonEnd+1);
      // Remove control characters that break JSON.parse
      jsonStr = jsonStr.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
      // Fix unescaped newlines inside string values
      jsonStr = jsonStr.replace(/([^\\])\n/g, '$1\\n');
      jsonStr = jsonStr.replace(/([^\\])\r/g, '$1\\r');
      jsonStr = jsonStr.replace(/([^\\])\t/g, '$1\\t');
      var parsed = JSON.parse(jsonStr);
      if (parsed.events && parsed.events.length > 0) {
        allEvents = parsed.events; // Gemini events only, no hardcoded mixing
        badge.textContent = '已更新：' + today;
        try {
          localStorage.setItem(cacheKey, JSON.stringify(parsed));
          Object.keys(localStorage).forEach(function(k) {
            if (k.startsWith('melb_events_') && k !== cacheKey) localStorage.removeItem(k);
          });
        } catch(e) {}
        return;
      }
    }
    // Gemini failed - use hardcoded fallback events
    allEvents = FALLBACK_EVENTS;
    badge.textContent = '活動資料：2026年6月（離線）';
  } catch(e) {
    console.error('loadEvents error:', e);
    allEvents = FALLBACK_EVENTS;
    badge.textContent = '活動資料：2026年6月（離線）';
  }
}
